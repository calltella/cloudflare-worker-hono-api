name: Deploy Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npx opennextjs-cloudflare build  # ✅ OpenNext用ビルド

      - name: Deploy to Cloudflare
        run: npx wrangler deploy

      - name: Set Cloudflare Secrets
        run: |
          echo "${{ secrets.R2_ACCESS_KEY_ID }}" | npx wrangler secret put R2_ACCESS_KEY_ID
          echo "${{ secrets.R2_ACCESS_KEY_ID_PRIVATE_S3 }}" | npx wrangler secret put R2_ACCESS_KEY_ID_PRIVATE_S3
          echo "${{ secrets.R2_SECRET_ACCESS_KEY }}" | npx wrangler secret put R2_SECRET_ACCESS_KEY
          echo "${{ secrets.R2_SECRET_ACCESS_KEY_S3 }}" | npx wrangler secret put R2_SECRET_ACCESS_KEY_S3
          echo "${{ secrets.MAILGUN_API_KEY }}" | npx wrangler secret put MAILGUN_API_KEY
          echo "${{ secrets.MAILGUN_DOMAIN }}" | npx wrangler secret put MAILGUN_DOMAIN
          echo "${{ secrets.MAIL_FROM }}" | npx wrangler secret put MAIL_FROM
          echo "${{ secrets.NEXT_PUBLIC_IMAGE_BASE_URL }}" | npx wrangler secret put NEXT_PUBLIC_IMAGE_BASE_URL
          echo "${{ secrets.R2_BUCKET }}" | npx wrangler secret put R2_BUCKET
          echo "${{ secrets.R2_PUBLIC_BUCKET }}" | npx wrangler secret put R2_PUBLIC_BUCKET
          echo "${{ secrets.CLOUDFLARE_ENV }}" | npx wrangler secret put CLOUDFLARE_ENV
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET 
          echo "${{ secrets.KV_SIGNING_SECRET }}" | npx wrangler secret put KV_SIGNING_SECRET 
          
